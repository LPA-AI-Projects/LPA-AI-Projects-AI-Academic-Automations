services:
  postgres:
    image: postgres:latest
    container_name: course_ai_postgres
    restart: unless-stopped  # important for local resilience
    environment:
      POSTGRES_DB: course_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ expects versioned subdir under /var/lib/postgresql
      - course_ai_pgdata:/var/lib/postgresql

volumes:
  course_ai_pgdata:
